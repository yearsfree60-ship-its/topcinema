<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>مشغل يوتيوب الشخصي | بدون إعلانات أو اقتراحات</title>
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%D9%85%D8%B4%D8%BA%D9%84%20%D9%8A%D9%88%D8%AA%D9%8A%D9%88%D8%A8%20%D8%A7%D9%84%D8%B4%D8%AE%D8%B5%D9%8A%22%2C%22short_name%22%3A%22%D9%85%D8%B4%D8%BA%D9%84%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ccircle%20cx%3D'50'%20cy%3D'50'%20r%3D'45'%20fill%3D'%23f00'%2F%3E%3Cpolygon%20points%3D'40%2C30%2070%2C50%2040%2C70'%20fill%3D'white'%2F%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #player-wrapper {
      position: relative;
      width: 100%;
      background: #111;
      aspect-ratio: 16 / 9;
      max-height: 50vh;
      flex-shrink: 0;
    }
    #player {
      width: 100%;
      height: 100%;
    }
    .controls-panel {
      background: #1a1a1a;
      padding: 8px 10px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .btn {
      background: #333;
      border: none;
      color: white;
      font-size: 1.4rem;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      transition: background 0.2s;
    }
    .btn:active { background: #555; }
    .btn.active { background: #c62828; }
    .time-display {
      font-size: 0.9rem;
      margin: 0 4px;
      white-space: nowrap;
    }
    input[type="range"] {
      flex: 1;
      min-width: 80px;
      height: 6px;
      -webkit-appearance: none;
      background: #444;
      border-radius: 3px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #f00;
      border-radius: 50%;
    }
    .add-section {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      background: #0f0f0f;
      flex-shrink: 0;
    }
    #url-input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    #add-btn {
      background: #0d47a1;
      font-size: 1.2rem;
      font-weight: bold;
      padding: 12px 18px;
    }
    .playlist-container {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      background: #0a0a0a;
    }
    .playlist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e1e1e;
      margin: 4px 0;
      padding: 12px;
      border-radius: 10px;
      gap: 8px;
    }
    .playlist-item.current {
      background: #263238;
      border: 1px solid #f00;
    }
    .video-title {
      flex: 1;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .playlist-item button {
      background: transparent;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      padding: 8px;
      cursor: pointer;
    }
    .empty-message {
      text-align: center;
      padding: 30px;
      color: #666;
    }
  </style>
</head>
<body>

<div id="player-wrapper">
  <div id="player"></div>
</div>

<div class="controls-panel">
  <button class="btn" id="prev-btn" title="السابق">⏮️</button>
  <button class="btn" id="play-btn" title="تشغيل/إيقاف">▶️</button>
  <button class="btn" id="next-btn" title="التالي">⏭️</button>
  <input type="range" id="seek-bar" value="0" min="0" step="0.1">
  <span class="time-display" id="time-current">0:00</span>
  <span class="time-display">/</span>
  <span class="time-display" id="time-duration">0:00</span>
  <button class="btn" id="loop-btn" title="تكرار">🔁</button>
  <button class="btn" id="fullscreen-btn" title="ملء الشاشة">⛶</button>
</div>

<div class="add-section">
  <input type="text" id="url-input" placeholder="ألصق رابط يوتيوب هنا واضغط إضافة..." autocomplete="off">
  <button class="btn" id="add-btn">➕ إضافة</button>
</div>

<div class="playlist-container" id="playlist">
  <div class="empty-message">لا توجد فيديوهات مضافة. أضف رابطاً للبدء.</div>
</div>

<script>
  (function() {
    // ---------- عناصر الواجهة ----------
    const playerEl = document.getElementById('player');
    const playBtn = document.getElementById('play-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const seekBar = document.getElementById('seek-bar');
    const timeCurrent = document.getElementById('time-current');
    const timeDuration = document.getElementById('time-duration');
    const loopBtn = document.getElementById('loop-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const urlInput = document.getElementById('url-input');
    const addBtn = document.getElementById('add-btn');
    const playlistDiv = document.getElementById('playlist');

    // ---------- حالة التطبيق ----------
    let playlist = [];                // { id, title }
    let currentIndex = -1;
    let player = null;
    let updateInterval = null;
    let loopMode = false;

    // ---------- دوال مساعدة ----------
    function extractYouTubeID(url) {
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([^#&?]{11})/,
        /^([^#&?]{11})$/
      ];
      for (const p of patterns) {
        const match = url.match(p);
        if (match) return match[1];
      }
      return null;
    }

    async function fetchVideoTitle(videoId) {
      try {
        const resp = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
        if (!resp.ok) throw new Error('فشل');
        const data = await resp.json();
        return data.title || videoId;
      } catch (e) {
        return videoId; // fallback
      }
    }

    function saveData() {
      const data = {
        playlist,
        currentIndex,
        currentTime: player ? player.getCurrentTime() : 0,
        loopMode
      };
      localStorage.setItem('ytplayer_data', JSON.stringify(data));
    }

    function loadData() {
      const saved = localStorage.getItem('ytplayer_data');
      if (saved) {
        try {
          const data = JSON.parse(saved);
          playlist = data.playlist || [];
          currentIndex = data.currentIndex !== undefined ? data.currentIndex : -1;
          loopMode = data.loopMode || false;
          updateLoopButton();
          if (currentIndex >= playlist.length) currentIndex = -1;
          return data.currentTime || 0;
        } catch (e) {}
      }
      return 0;
    }

    function renderPlaylist() {
      playlistDiv.innerHTML = '';
      if (playlist.length === 0) {
        playlistDiv.innerHTML = '<div class="empty-message">لا توجد فيديوهات مضافة. أضف رابطاً للبدء.</div>';
        return;
      }
      playlist.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = `playlist-item${idx === currentIndex ? ' current' : ''}`;
        div.innerHTML = `
          <span class="video-title">${item.title}</span>
          <button class="play-item-btn" data-index="${idx}">▶️</button>
          <button class="delete-item-btn" data-index="${idx}">🗑️</button>
        `;
        playlistDiv.appendChild(div);
      });

      // ربط الأحداث
      document.querySelectorAll('.play-item-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.dataset.index);
          playVideoAtIndex(idx);
        });
      });
      document.querySelectorAll('.delete-item-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.dataset.index);
          deleteVideoAtIndex(idx);
        });
      });
    }

    async function addVideo(url) {
      const id = extractYouTubeID(url.trim());
      if (!id) {
        alert('رابط يوتيوب غير صالح');
        return;
      }
      if (playlist.some(item => item.id === id)) {
        alert('هذا الفيديو موجود بالفعل في القائمة');
        return;
      }
      const title = await fetchVideoTitle(id);
      playlist.push({ id, title });
      saveData();
      renderPlaylist();
      urlInput.value = '';
      // إذا كانت القائمة فارغة سابقاً، شغّل الفيديو الجديد تلقائياً
      if (currentIndex === -1 && playlist.length === 1) {
        playVideoAtIndex(0);
      }
    }

    function playVideoAtIndex(index) {
      if (index < 0 || index >= playlist.length) return;
      currentIndex = index;
      const videoId = playlist[index].id;
      if (player && player.loadVideoById) {
        player.loadVideoById(videoId);
      }
      renderPlaylist();
      saveData();
    }

    function deleteVideoAtIndex(index) {
      if (index < 0 || index >= playlist.length) return;
      const wasCurrent = (index === currentIndex);
      playlist.splice(index, 1);
      if (playlist.length === 0) {
        currentIndex = -1;
        if (player) player.stopVideo();
      } else if (wasCurrent) {
        // إذا حذفنا الفيديو الحالي ننتقل للتالي أو السابق
        if (index < playlist.length) {
          playVideoAtIndex(index);
        } else {
          playVideoAtIndex(playlist.length - 1);
        }
      } else if (index < currentIndex) {
        currentIndex--;
      }
      saveData();
      renderPlaylist();
    }

    function playNext() {
      if (playlist.length === 0) return;
      let nextIdx = currentIndex + 1;
      if (nextIdx >= playlist.length) {
        if (loopMode) {
          nextIdx = 0;
        } else {
          return; // لا نفعل شيئاً إذا انتهت القائمة بدون تكرار
        }
      }
      playVideoAtIndex(nextIdx);
    }

    function playPrevious() {
      if (playlist.length === 0) return;
      let prevIdx = currentIndex - 1;
      if (prevIdx < 0) prevIdx = playlist.length - 1;
      playVideoAtIndex(prevIdx);
    }

    function formatTime(seconds) {
      if (isNaN(seconds) || seconds < 0) return '0:00';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function updateSeekBar() {
      if (!player || !player.getCurrentTime || !player.getDuration) return;
      const current = player.getCurrentTime();
      const duration = player.getDuration();
      if (duration > 0) {
        seekBar.max = duration;
        seekBar.value = current;
        timeCurrent.textContent = formatTime(current);
        timeDuration.textContent = formatTime(duration);
      }
    }

    function updatePlayButton(state) {
      if (state === YT.PlayerState.PLAYING) {
        playBtn.textContent = '⏸️';
      } else {
        playBtn.textContent = '▶️';
      }
    }

    function updateLoopButton() {
      loopBtn.classList.toggle('active', loopMode);
    }

    function onPlayerStateChange(event) {
      updatePlayButton(event.data);
      if (event.data === YT.PlayerState.ENDED) {
        saveData();
        // الانتقال إلى الفيديو التالي بعد انتهاء الفيديو الحالي (يمنع ظهور اقتراحات يوتيوب)
        playNext();
      }
    }

    function onPlayerReady(event) {
      // استعادة وقت التشغيل السابق إذا كان نفس الفيديو
      const savedTime = loadData(); // يعيد currentTime المحفوظ
      if (savedTime > 0 && player.getDuration() > savedTime) {
        player.seekTo(savedTime);
      }
      player.playVideo();
      updateInterval = setInterval(() => {
        updateSeekBar();
        saveData(); // حفظ مستمر للتقدم
      }, 500);
    }

    function initPlayer() {
      if (typeof YT === 'undefined' || !YT.Player) {
        setTimeout(initPlayer, 200);
        return;
      }
      const savedCurrentTime = loadData(); // تحميل القائمة والفهرس

      player = new YT.Player('player', {
        videoId: playlist.length > 0 && currentIndex >= 0 ? playlist[currentIndex].id : '',
        playerVars: {
          controls: 0,
          modestbranding: 1,
          rel: 0,
          showinfo: 0,
          iv_load_policy: 3,
          autoplay: 1,
          playsinline: 1,
          fs: 0 // سنستخدم زر ملء الشاشة الخاص بنا
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange,
          onError: (e) => alert('خطأ في تحميل الفيديو')
        }
      });

      renderPlaylist();
      if (currentIndex >= 0 && currentIndex < playlist.length) {
        // سيتم التحميل عبر videoId أعلاه
      }
      updateLoopButton();
    }

    // ---------- مستمعو الأحداث ----------
    addBtn.addEventListener('click', () => {
      const url = urlInput.value.trim();
      if (url) addVideo(url);
    });
    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        addBtn.click();
      }
    });

    playBtn.addEventListener('click', () => {
      if (!player) return;
      if (player.getPlayerState() === YT.PlayerState.PLAYING) {
        player.pauseVideo();
      } else {
        player.playVideo();
      }
    });

    prevBtn.addEventListener('click', playPrevious);
    nextBtn.addEventListener('click', playNext);

    seekBar.addEventListener('input', () => {
      if (player && player.seekTo) {
        player.seekTo(parseFloat(seekBar.value), true);
      }
    });

    loopBtn.addEventListener('click', () => {
      loopMode = !loopMode;
      updateLoopButton();
      saveData();
    });

    fullscreenBtn.addEventListener('click', () => {
      const wrapper = document.getElementById('player-wrapper');
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        if (wrapper.requestFullscreen) {
          wrapper.requestFullscreen();
        } else if (wrapper.webkitRequestFullscreen) {
          wrapper.webkitRequestFullscreen();
        }
      }
    });

    // مزامنة زر ملء الشاشة مع الخروج منه
    document.addEventListener('fullscreenchange', () => {
      fullscreenBtn.textContent = document.fullscreenElement ? '⛶' : '⛶';
    });

    // تحميل مكتبة يوتيوب
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    window.onYouTubeIframeAPIReady = initPlayer;

    // تنظيف المؤقت عند المغادرة
    window.addEventListener('beforeunload', () => {
      if (updateInterval) clearInterval(updateInterval);
      saveData();
    });

    // بدء أولي
    loadData();
    renderPlaylist();
  })();
</script>
</body>
</html>
